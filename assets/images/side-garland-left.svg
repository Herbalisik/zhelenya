    <circle class="halo" r="18"/><ellipse class="bulb" rx="5.8" ry="7.4"/><circle class="core" cx="-1.6" cy="-2" r="2.1"/>
  </g>
  <g class="dim" transform="translate(83 138) rotate(11)">
