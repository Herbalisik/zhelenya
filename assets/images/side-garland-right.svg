<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 1000" preserveAspectRatio="none">
  <defs>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.98  0 1 0 0 0.72  0 0 1 0 0.28  0 0 0 .9 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wireShadow" x="-30%" y="-5%" width="160%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#ffffff" flood-opacity="0.35"/>
    </filter>
    <style>
      .wire{fill:none;stroke:#17120f;stroke-width:2.25;stroke-linecap:round;stroke-linejoin:round;opacity:.58;filter:url(#wireShadow)}
      .lead{stroke:#17120f;stroke-width:1.45;stroke-linecap:round;opacity:.62}
      .cap{fill:#17120f;opacity:.72}
      .halo{fill:#ffcf75;opacity:.25;filter:url(#softGlow)}
      .bulb{fill:#fff6bf;stroke:#ffe39b;stroke-width:1.1;opacity:.95;filter:url(#softGlow)}
      .core{fill:#fffdf0;opacity:.92}
      .dim .halo{opacity:.17}.dim .bulb{opacity:.82}
      .bright .halo{opacity:.35}.bright .bulb{opacity:1}
    </style>
  </defs>

  <path class="wire" d="M54 -20 C86 44 31 111 68 176 C103 238 27 308 63 382 C94 445 35 500 72 574 C104 639 24 704 59 776 C89 836 34 908 72 1020"/>

